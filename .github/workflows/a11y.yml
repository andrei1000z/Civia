name: A11y Audit

on:
  pull_request:
    branches: [main]
    paths:
      - "src/app/**"
      - "src/components/**"
      - "src/app/globals.css"
  workflow_dispatch:

jobs:
  pa11y:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install --no-audit --prefer-offline

      - name: Install Pa11y
        run: npm install -g pa11y-ci

      - name: Build app
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://dummy.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: dummy-key-for-build
          SUPABASE_SERVICE_ROLE_KEY: dummy-service-key
          GROQ_API_KEY: dummy-key
          NEXT_PUBLIC_SITE_URL: https://civia.ro

      - name: Start app
        run: npm run start &
        env:
          PORT: 3000
          NEXT_PUBLIC_SUPABASE_URL: https://dummy.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: dummy-key

      - name: Wait for server
        run: |
          for i in {1..30}; do
            curl -sf http://localhost:3000 > /dev/null && break
            sleep 2
          done

      - name: Run Pa11y on critical pages
        run: |
          pa11y-ci --config .pa11yci.json
        continue-on-error: true

      - name: Upload Pa11y report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pa11y-report
          path: pa11y-report.json
          if-no-files-found: ignore
