name: Bundle Size

on:
  pull_request:
    paths:
      - "src/**"
      - "package.json"
      - "package-lock.json"
      - "next.config.ts"

permissions:
  contents: read
  pull-requests: write

jobs:
  bundle:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: Build (production)
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: http://localhost:3000
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Measure bundle
        id: bundle
        run: |
          # Sum total .js size in .next/static, report per-route chunk sizes.
          TOTAL=$(find .next/static -name "*.js" -type f -exec du -b {} + | awk '{sum+=$1} END {print sum}')
          TOTAL_KB=$((TOTAL / 1024))
          echo "total_kb=$TOTAL_KB" >> $GITHUB_OUTPUT

          # Hard limit: 5000 KB total static JS. Fail if exceeded — bundle bloat.
          if [ "$TOTAL_KB" -gt 5000 ]; then
            echo "::error::Bundle exceeds 5000 KB limit ($TOTAL_KB KB)"
            exit 1
          fi

          # Soft warning at 4000 KB.
          if [ "$TOTAL_KB" -gt 4000 ]; then
            echo "::warning::Bundle is large: $TOTAL_KB KB (limit 5000 KB)"
          fi

          echo "✓ Total static JS: $TOTAL_KB KB"

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const total = '${{ steps.bundle.outputs.total_kb }}';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `📦 **Bundle size**: \`${total} KB\` total static JS (limit 5000 KB)`,
            });
