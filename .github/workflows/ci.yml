name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        # `npm ci` falla pe lockfile validation cand un optional dep
        # (@rolldown/binding-wasm32-wasi) pinneaza exact transitive
        # (@emnapi/core@1.9.2) iar lockfile-ul are 1.10.0 resolved.
        # `npm install` tolerează acelasi caz pe platformele unde
        # optional-ul nu se instaleaza.
        run: npm install --no-audit --prefer-offline

      - name: Security audit (block high+)
        # 2026-05-24 Faza 5: blocăm deploy pe vulnerabilități HIGH sau CRITICAL.
        # `--audit-level=high` exit code 1 dacă găsește. Moderate + low ignored
        # (zgomot prea mare în npm ecosystem, multe false-positives in dev deps).
        # `|| true` pe production-only ar fi soft warning; lăsăm strict.
        run: npm audit --audit-level=high --production

      - name: Lint (strict — zero warnings)
        # 2026-05-24 Faza 7: --max-warnings 0 blochează merge pe orice warning.
        # Forțează cleanup imediat al noi warnings în loc să se acumuleze.
        run: npm run lint -- --max-warnings 0

      - name: Type check
        run: npx tsc --noEmit

      - name: Tests
        run: npm test

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://dummy.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: dummy-key-for-build
          SUPABASE_SERVICE_ROLE_KEY: dummy-service-key
          GROQ_API_KEY: dummy-key
          NEXT_PUBLIC_SITE_URL: https://civia.ro
